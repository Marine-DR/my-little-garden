name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version component to increment
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      commit_sha: ${{ steps.version.outputs.commit_sha }}

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Bump and commit version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        shell: bash
        run: |
          npm version "$RELEASE_TYPE" --no-git-tag-version --ignore-scripts
          app_version=$(node -p "require('./package.json').version")

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v$app_version"
          git push origin HEAD:main

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-release:
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_pattern: 'release/*.AppImage'
            artifact_name: appimage
          - os: macos-latest
            artifact_pattern: 'release/*.dmg'
            artifact_name: dmg
          - os: windows-latest
            artifact_pattern: 'release/*.exe'
            artifact_name: exe

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release.outputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        # The publish-release job creates the GitHub release after collecting all
        # platform artifacts. Prevent electron-builder from attempting to publish
        # from each matrix job, which would require a separate GH_TOKEN.
        run: npm run dist -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: my-little-garden-${{ needs.prepare-release.outputs.app_version }}-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_pattern }}

  publish-release:
    needs:
      - prepare-release
      - build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: my-little-garden-${{ needs.prepare-release.outputs.app_version }}-*
          merge-multiple: true
          path: release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare-release.outputs.app_version }}
          target_commitish: ${{ needs.prepare-release.outputs.commit_sha }}
          name: My Little Garden v${{ needs.prepare-release.outputs.app_version }}
          generate_release_notes: true
          files: release/*
          token: ${{ github.token }}
