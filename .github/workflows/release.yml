name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in Semantic Versioning format (for example, 0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate Semantic Versioning version
        id: version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          semver_pattern='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'

          if [[ ! "$RELEASE_VERSION" =~ $semver_pattern ]]; then
            echo "Release version must be valid Semantic Versioning (for example, 0.1.0 or 1.2.3-rc.1)." >&2
            exit 1
          fi

          package_version=$(node -p "require('./package.json').version")
          if [[ "$RELEASE_VERSION" != "$package_version" ]]; then
            echo "Release version ($RELEASE_VERSION) must match package.json version ($package_version) on main." >&2
            exit 1
          fi

          echo "app_version=$package_version" >> "$GITHUB_OUTPUT"
          if [[ "$RELEASE_VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build-release:
    needs: validate-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_pattern: 'release/*.AppImage'
            artifact_name: appimage
          - os: macos-latest
            artifact_pattern: 'release/*.dmg'
            artifact_name: dmg
          - os: windows-latest
            artifact_pattern: 'release/*.exe'
            artifact_name: exe

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-little-garden-${{ needs.validate-release.outputs.app_version }}-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_pattern }}

  publish-release:
    needs:
      - validate-release
      - build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: my-little-garden-${{ needs.validate-release.outputs.app_version }}-*
          merge-multiple: true
          path: release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-release.outputs.app_version }}
          target_commitish: main
          name: My Little Garden v${{ needs.validate-release.outputs.app_version }}
          prerelease: ${{ needs.validate-release.outputs.prerelease }}
          generate_release_notes: true
          files: release/*
